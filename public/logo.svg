<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="AK — Akshat Patel">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- A: left leg -->
  <line x1="2" y1="28" x2="15.5" y2="4" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Shared stem: A right leg + K vertical -->
  <line x1="15.5" y1="4" x2="15.5" y2="28" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- A: crossbar -->
  <line x1="7.5" y1="20" x2="15.5" y2="20" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- K: upper arm -->
  <line x1="15.5" y1="15" x2="29.5" y2="4" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- K: lower arm -->
  <line x1="15.5" y1="15" x2="29.5" y2="27" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
</svg>
