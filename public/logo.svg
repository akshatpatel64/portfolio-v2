<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 32" width="40" height="32" role="img" aria-label="AK — Akshat Patel">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
  </defs>
  <!-- A: left leg -->
  <line x1="2" y1="28" x2="13" y2="4" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- A: right leg — ends at same point as K stem top -->
  <line x1="13" y1="4" x2="20" y2="22" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- A: crossbar -->
  <line x1="6" y1="18" x2="17" y2="18" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- K: vertical stem -->
  <line x1="22" y1="4" x2="22" y2="28" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- K: upper arm -->
  <line x1="22" y1="15" x2="37" y2="4" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
  <!-- K: lower arm -->
  <line x1="22" y1="15" x2="37" y2="28" stroke="url(#g)" stroke-width="2.6" stroke-linecap="round"/>
</svg>
